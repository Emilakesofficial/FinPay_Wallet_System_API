<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="460" viewBox="0 0 800 460">
  <style>
    .box { fill:#f6f8fa; stroke:#2b2f33; stroke-width:1.5; rx:8; }
    .title { font: bold 14px sans-serif; fill:#111; }
    .label { font: 12px sans-serif; fill:#222; }
    .connector { stroke:#6b7280; stroke-width:1.2; marker-end:url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280" />
    </marker>
  </defs>

  <!-- API Layer -->
  <rect class="box" x="40" y="20" width="320" height="70" />
  <text class="title" x="60" y="44">API Layer (DRF)</text>
  <text class="label" x="60" y="64">Authentication, Validation, Throttling, Idempotency</text>

  <!-- Service Layer -->
  <rect class="box" x="240" y="120" width="320" height="90" />
  <text class="title" x="260" y="144">Service Layer</text>
  <text class="label" x="260" y="164">`WalletService` — atomic money movement</text>
  <text class="label" x="260" y="184">Pessimistic locking, double-entry enforcement</text>

  <!-- Persistence -->
  <rect class="box" x="40" y="240" width="240" height="80" />
  <text class="title" x="60" y="266">Persistence</text>
  <text class="label" x="60" y="286">Postgres (Wallets, Transactions, LedgerEntries)</text>

  <!-- Redis / Celery -->
  <rect class="box" x="340" y="240" width="200" height="80" />
  <text class="title" x="360" y="266">Redis / Celery</text>
  <text class="label" x="360" y="286">Broker / Result Backend / Background Tasks</text>

  <!-- Reconciliation -->
  <rect class="box" x="580" y="120" width="180" height="140" />
  <text class="title" x="600" y="144">Reconciliation</text>
  <text class="label" x="600" y="164">Parallel checks (Celery chords)</text>
  <text class="label" x="600" y="184">Aggregator → ReconciliationReport</text>

  <!-- Audit -->
  <rect class="box" x="40" y="350" width="720" height="70" />
  <text class="title" x="60" y="378">Audit & Observability</text>
  <text class="label" x="60" y="398">Immutable AuditLogs, structured logging (structlog), alerts</text>

  <!-- Connectors -->
  <line class="connector" x1="200" y1="90" x2="320" y2="120" />
  <line class="connector" x1="400" y1="210" x2="400" y2="240" />
  <line class="connector" x1="460" y1="210" x2="460" y2="240" />
  <line class="connector" x1="520" y1="210" x2="610" y2="180" />
  <line class="connector" x1="160" y1="210" x2="160" y2="240" />
  <line class="connector" x1="360" y1="320" x2="520" y2="320" />

  <!-- Legend -->
  <text class="label" x="580" y="40">High-level flow: Clients → API → Service → Persistence / Background</text>

</svg>
